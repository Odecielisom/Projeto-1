<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criação de sistemas - odecielisom</title>

    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            color: #1a1a1a;
            margin-top: 0;
        }
        form {
            background-color: #ffffff;
            width: 350px;
            padding: 30px;
            border-radius: 8px;
        }

        form div {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #4a4a4a;
        }

        input {
            width: 100%
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px
            box-sizing: border-box;
        }

        button {
            width: 100%
            background-color: #4f46e5;
            color: #ffffff;
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }     
    </style>
</head>
<body>

    <form>
        <div>
            <h1> Acesse o sistema</h1>
            <p>Faça login para gerenciar sua loja.</p>
        </div>
            <div> 
                    <label>E-mail:</label>
                    <input type"email">
            </div>

            <div>
                    <label>Senha:</label>
                    <input type="password">
            </div>

            <div>
                    <button type="submit">Entrar</button>
            </div>
    </form
        
</body>
</html>
