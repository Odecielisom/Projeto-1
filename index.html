<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criação de sistemas - odecielisom</title>

    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: arial, san-serif.
        }

        main {
            display: flex;
            background-color: #ffffff;
            width: 800px
            border-radius 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        form {
            width: 50%;
            padding: 40px;
            box-sizing: border-box;
        }
                
        h1 {
            color: #1a1a1a;
            margin-top: 0;
            font-size: 28px;
        }

        form div {
            margin-bottom: 20px;
        }

        
        label {
            display: block;
            margin-bottom: 5px;
            color: #4a4a4a;
            font-wight: bold;
            font-size: 14px;
        }

        input {
            width: 100%
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px
            box-sizing: border-box;
            background-color: #f9fafb;
        }

        button {
            width: 100%
            background-color: #4f46e5;
            color: #ffffff;
            padding: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        .painel-boas-vindas {
            width: 50%;
            background-color: #4f46e5;
            color: #ffffff;
            padding: 40px;
            box-sizing: border-box;
        }

        .painel-boas-vindas h2 {
            marging-top: 0;
            font-size: 28px;

        }

        .painel-boas-vindas ul
            padding-left: 20px;
            line-heigth: 2;
        }
    </style>
</head>
<body>

    <main>
        <form>
            <div>
                <h1> Acesse o sistema</h1>
                <p>Faça login para gerenciar sua loja.</p>
            </div>
                <div> 
                        <label>E-mail:</label>
                        <input type"email">
                </div>

                <div>
                        <label>Senha:</label>
                        <input type="password">
                </div>

                <div>
                        <button type="submit">Entrar</button>
                </div>
        </form>

        <div class="painel-boas-vindas">
            <H2>Bem-vindo ao Odé Sistens vendas </H2>
            <p>Gerencie seu painel de vendas e solicitações de forma eficiente</p>

            <ul>
                <li>Controle de estoque</li>
                <li>Controle de entrada e saída de produtos</li>
                <li>Controle de lucro eficiente</li>
                <li>Histórico empresarial completo</li>
            </ul>
        </div>
    </main>
        
</body>
</html>
