<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criação de sistemas - odecielisom</title>

    <style>
        body {
            background-color: #f0f2f5;
        }
        h1 {
            color: #1a1a1a;
        }
        form {
            background-color: #ffffff;
            width: 300px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>Acesse o sistema</h1>
    <p>Faça login para gerenciar sua loja.</p>

    <form>
            <div>
                    <label>E-mail:</label>
                    <input type"email">
            </div>

            <div>
                    <label>Senha:</label>
                    <input type="password">
            </div>

            <div>
                    <button type="submit">Entrar</button>
            </div>
    </form>
</body>
</html>
